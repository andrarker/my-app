name: Build Nicole AI APK

  on:
    push:
      branches: [ main ]
    workflow_dispatch:

  jobs:
    build-apk:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout codice
          uses: actions/checkout@v4

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: latest

        - name: Setup Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'pnpm'

        - name: Setup Java 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Installa dipendenze
          run: pnpm install

        - name: Expo Prebuild (genera cartella Android)
          working-directory: artifacts/nicole-ai
          env:
            EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          run: pnpm exec expo prebuild --platform android --no-install

        - name: Build APK Debug
          working-directory: artifacts/nicole-ai/android
          run: ./gradlew assembleDebug --no-daemon

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: Nicole-AI-APK
            path: artifacts/nicole-ai/android/app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30
  