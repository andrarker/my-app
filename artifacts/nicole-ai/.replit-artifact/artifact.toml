kind = "mobile"
previewPath = "/"
title = "Nicole La Porchetta AI"
version = "1.0.0"
id = "artifacts/nicole-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20700

[services.development]
run = "pnpm --filter @workspace/nicole-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nicole-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nicole-ai", "run", "serve" ]

[services.env]
PORT = "20700"
BASE_PATH = "/"
